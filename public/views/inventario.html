<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventario</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.1/flowbite.min.css" rel="stylesheet" />
</head>

<body class="bg-gray-100">
  <div id="menu-container"></div>

  <div class="p-4">
    <div class="flex gap-4 h-[calc(100vh-120px)]">
      <section class="w-3/4 bg-white rounded-2xl shadow-md p-5 flex flex-col">
        <div class="flex item-center justify-between mb-4">
          <h1 class="text-xl font-semibold text-gray-800">Inventario</h1>
          <div class="text-sm text-gray-500">
            Sucursal:
            <span id="sucursal-actual" class="font-medium text-gray-800"></span>
          </div>
        </div>

        <div class="mb-4">
          <input id="buscar-articulo" type="text"
            class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg block w-full p-3"
            placeholder="Buscar por nombre o folio" />
        </div>

        <div class="relative overflow-x-auto flex-1">
          <table class="w-full text-sm text-left text-gray-500">
            <thead class="text-xs text-white uppercase bg-[#1c2140]">
              <tr>
                <th class="px-6 py-3 rounded-l-lg">Folio</th>
                <th class="px-6 py-3">Código</th>
                <th class="px-6 py-3">Artículo</th>
                <th class="px-6 py-3">Precio</th>
                <th class="px-6 py-3">Existencias</th>
                <th class="px-6 py-3 rounded-r-lg">Acciones</th>
              </tr>
            </thead>
            <tbody id="tabla-inventario" class="bg-white"></tbody>
          </table>
        </div>
      </section>

      <aside class="w-1/4 h-full min-h-0 bg-white rounded-2xl shadow-md p-5 flex flex-col">
        <div class="flex-1 min-h-0 overflow-y-auto pr-1">
          <h2 class="text-lg font-semibold text-gray-800 mt-6 mb-3">
            Existencias por sucursal
          </h2>
          <label for="sucursal-select" class="block text-sm text-gray-600 mb-1">Sucursal</label>
          <select id="sucursal-select"
            class="mb-3 bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg block w-full p-2.5"></select>

          <button id="btn-buscar-sucursal" type="button"
            class="w-full text-white bg-blue-600 hover:bg-blue-700 font-medium rounded-lg text-sm px-5 py-2.5">
            Buscar existencias por sucursal
          </button>

          <div class="mt-4 bg-gray-50 border border-gray-200 rounded-lg p-4">
            <p class="text-sm text-gray-500">Artículo seleccionado</p>
            <p id="articulo-seleccionado" class="text-sm font-medium text-gray-800">
              Ninguno
            </p>
            <p class="text-sm text-gray-500 mt-3">Existencias en sucursal</p>
            <p id="existencias-sucursal" class="text-3xl font-bold text-gray-800">
              0
            </p>
          </div>

          <div class="my-6 border-t border-gray-200"></div>

          <h2 class="text-lg font-semibold text-gray-800 mb-3">Artículo</h2>

          <form id="form-articulo" class="space-y-3">
            <input id="input-folio" type="text" class="w-full bg-gray-50 border border-gray-300 text-sm rounded-lg p-2.5"
              placeholder="Folio" required />
            <input id="input-codigo" type="text" class="w-full bg-gray-50 border border-gray-300 text-sm rounded-lg p-2.5"
              placeholder="Código" required />
            <input id="input-nombre" type="text" class="w-full bg-gray-50 border border-gray-300 text-sm rounded-lg p-2.5"
              placeholder="Nombre del artículo" required />
            <input id="input-precio" type="number" step="0.01" min="0"
              class="w-full bg-gray-50 border border-gray-300 text-sm rounded-lg p-2.5" placeholder="Precio" required />
            <input id="input-existencias-actual" type="number" min="0" step="1"
              class="w-full bg-gray-50 border border-gray-300 text-sm rounded-lg p-2.5"
              placeholder="Existencias en sucursal actual" required />

            <div class="grid grid-cols-2 gap-2">
              <button id="btn-guardar-articulo" type="submit"
                class="text-white bg-blue-600 hover:bg-blue-700 font-medium rounded-lg text-sm px-4 py-2.5">
                Guardar
              </button>
              <button id="btn-cancelar-edicion" type="button"
                class="text-gray-700 bg-gray-100 hover:bg-gray-200 font-medium rounded-lg text-sm px-4 py-2.5">
                Cancelar
              </button>
            </div>
          </form>
        </div>
      </aside>
    </div>
  </div>

  <script>
    fetch("../components/menu.html")
      .then((response) => response.text())
      .then((data) => {
        document.getElementById("menu-container").innerHTML = data;
      });
  </script>

  <script src="../js/inventario.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.1/flowbite.min.js"></script>
</body>

</html>
