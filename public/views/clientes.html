<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes</title>

    
    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.1/flowbite.min.css" rel="stylesheet">

</head>
<body class="bg-gray-100 text-gray-900 dark:bg-gray-900 dark:text-gray-100">

    <div id="menu-container"></div>

    <div class="flex h-[calc(100vh - 120px)] p-4 gap-4 justify-center">
        
 <!-- CONTENIDO PRINCIPAL -->
        <div class="flex-1 flex gap-4 justify-center">

            <!-- Clientes -->
             <div class="w-full max-w-6xl flex flex-col">

                <div class="mb-4">
                    <h2 class="text-lg font-semibold mb-2 text-gray-800 dark:text-gray-100">Buscar Clientes por Nombre, Empresa o Correo</h2>

                    <div class="relative">
                        <input id="buscar-cliente" type="text" autocomplete="off"
                        class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg block w-full p-3 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-100 dark:placeholder-gray-400"
                        placeholder="Buscar cliente...">

                        <div id="lista-clientes" class="hidden absolute left-0 right-0 mt-1 bg-white border border-gray-200 rounded-lg shadow-md max-h-64 overflow-y-auto z-50 dark:bg-gray-800 dark:border-gray-700"></div>
                    </div>
                </div>
                
                <div class="mb-9"></div>
                <div class="relative overflow-x-auto bg-transparent w-full mx-auto">
                    
                    <table class="w-full text-sm text-left text-gray-600 dark:text-gray-300">
                        <thead class="text-xs text-white uppercase bg-[#1c2140] dark:bg-gray-800">
                            <tr>
                            <th class="px-6 py-3 rounded-l-lg">Cliente</th>
                                <th class="px-6 py-3">Empresa</th>
                                <th class="px-6 py-3">Correo </th>
                                <th class="px-6 py-3">Teléfono</th>
                                <th class="px-6 py-3">Saldo Monedero</th>
                                <th class="px-6 py-3"> Rango</th>
                                <th class="px-6 py-3 rounded-r-lg">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="detalle-clientes" class="bg-transparent">
                            <tr>
                                <td class="px-6 py-6 text-sm text-gray-400 dark:text-gray-500" colspan="7">No hay clientes agregados</td>
                            </tr>
                        </tbody>
                    </table>
                    
                </div>
                
             </div>
        </div>

        <!-- Aside Bar para modificar -->
      <aside class="w-full lg:w-1/4 h-full min-h-0 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl shadow-md p-5 flex flex-col">
        <div class="flex-1 min-h-0 overflow-y-auto pr-1">
          <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-100 mt-6 mb-3">
            Gestion de Clientes
          </h2>
          <div class="mt-4 bg-white border border-gray-200 rounded-xl p-6 shadow-sm text-center dark:bg-gray-700 dark:border-gray-600">
            <p class="text-sm text-gray-500 uppercase tracking-wide dark:text-gray-400">
                                        Número de Clientes
            </p>
        <p id="total-clientes" class="text-4xl font-bold text-blue-600 mt-2">
        0
         </p>

        </div>

          <div class="my-6 border-t border-gray-200 dark:border-gray-700"></div>


          <form id="form-articulo" class="space-y-5">
            
            <input id="input-Nombre" type="text" class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100 dark:placeholder-gray-400"
              placeholder="Nombre" required />
            <input id="input-Empresa" type="text" class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100 dark:placeholder-gray-400"
              placeholder="Empresa" required />
            <input id="input-correo" type="email" class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100 dark:placeholder-gray-400"
              placeholder="Correo" required />
            <input id="input-telefono" type="number" step="0.01" min="0"
              class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100 dark:placeholder-gray-400" placeholder="Teléfono" required />
            <input id="input-saldo" type="number" min="0" step="1"
              class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100 dark:placeholder-gray-400"
              placeholder="Saldo Monedero" required />
            <select id="input-rango" class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100" required>
              <option value="">Seleccionar Rango</option>
              <option value="0">Sin Rango</option>
              <option value="1">Diamante</option>
              <option value="2">Oro</option>
              <option value="3">Plata</option>
              <option value="4">Bronce</option>
            </select>

            <div class="grid grid-cols-2 gap-2">
              <button id="btn-guardar-articulo" type="submit"
                class="text-white bg-blue-600 hover:bg-blue-700 font-medium rounded-lg text-sm px-4 py-2.5">
                Guardar
              </button>
              <button id="btn-cancelar-edicion" type="button"
                class="text-gray-700 bg-gray-100 hover:bg-gray-200 dark:text-gray-100 dark:bg-gray-700 dark:hover:bg-gray-600 font-medium rounded-lg text-sm px-4 py-2.5">
                Cancelar
              </button>
            </div>
          </form>
        </div>
      </aside>

    </div>

    <!-- Script para cargar widget -->
    <script>
        fetch("../components/menu.html")
        .then(response => response.text())
        .then(data => {
            document.getElementById("menu-container").innerHTML = data;
        });
    </script>

    <script src="../js/clientes.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.1/flowbite.min.js"></script>

</body>

</html>
