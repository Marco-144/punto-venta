<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descuentos</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.1/flowbite.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-900 dark:bg-gray-900 dark:text-gray-100">

    <!-- Menu de navegacion -->
    <div id="menu-container"></div>

    <div class="flex h-[calc(100vh_-_120px)] p-4 gap-4 justify-center">
        <div class="w-full max-w-6xl flex flex-col">
            <div class="mb-6">
                <h2 class="text-xl font-semibold mb-2 text-gray-800 dark:text-gray-100">Gestion de Descuentos</h2>
                <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">Busca y administra descuentos por rango de cliente.</p>

                <div class="relative">
                    <input id="buscar-descuento" type="text" autocomplete="off"
                        class="bg-white border border-gray-300 text-gray-900 text-sm rounded-xl block w-full p-3 shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-100 dark:placeholder-gray-400"
                        placeholder="Buscar descuento...">

                    <div id="lista-descuentos" class="hidden absolute left-0 right-0 mt-1 bg-white border border-gray-200 rounded-lg shadow-md max-h-64 overflow-y-auto z-50 dark:bg-gray-800 dark:border-gray-700"></div>
                </div>
            </div>

            <div class="relative overflow-hidden rounded-2xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 shadow-md w-full mx-auto">
                <div class="overflow-x-auto">
                    <table class="w-full min-w-[760px] text-sm text-left text-gray-600 dark:text-gray-300">
                    <thead class="text-xs text-white uppercase bg-[#1c2140] dark:bg-gray-700">
                        <tr>
                            <th class="px-6 py-4">ID Rango</th>
                            <th class="px-6 py-4">Nombre</th>
                            <th class="px-6 py-4">Rango</th>
                            <th class="px-6 py-4 text-right">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="detalle-descuentos" class="divide-y divide-gray-100 dark:divide-gray-700">
                      
                    </tbody>
                </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Script para cargar widget -->
    <script>
        fetch("../components/menu.html")
            .then(response => response.text())
            .then(data => {
                document.getElementById("menu-container").innerHTML = data;
            });
    </script>

    <script src="../js/descuentos.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.1/flowbite.min.js"></script>

</body>
</html>
